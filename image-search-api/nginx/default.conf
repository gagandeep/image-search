# CORS: allow getaipage.com and all its subdomains.
# $cors_origin is set to the incoming Origin value when it matches,
# empty string otherwise — so add_header emits nothing for non-matching origins.
map $http_origin $cors_origin {
    default                                              "";
    "~^https?://(.*\.)?getaipage\.com(:[0-9]+)?$"       $http_origin;
}

server {
    listen      80;
    server_name images.innerkore.com;

    # Forward real client IP to the upstream app
    real_ip_header    X-Forwarded-For;
    set_real_ip_from  0.0.0.0/0;

    # ── CORS preflight ───────────────────────────────────────────────────
    # Must be handled before proxy_pass so we can short-circuit with 204.
    location / {
        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Allow-Origin'      $cors_origin;
            add_header 'Access-Control-Allow-Credentials' 'true';
            add_header 'Access-Control-Allow-Methods'     'GET, POST, PUT, PATCH, DELETE, OPTIONS';
            add_header 'Access-Control-Allow-Headers'     'Authorization, Content-Type, Accept, Origin, X-Requested-With';
            add_header 'Access-Control-Max-Age'           '86400';
            add_header 'Content-Type'                     'text/plain; charset=utf-8';
            add_header 'Content-Length'                   '0';
            return 204;
        }

        # ── CORS headers on every real response ──────────────────────────
        add_header 'Access-Control-Allow-Origin'      $cors_origin                                          always;
        add_header 'Access-Control-Allow-Credentials' 'true'                                                always;
        add_header 'Access-Control-Allow-Methods'     'GET, POST, PUT, PATCH, DELETE, OPTIONS'              always;
        add_header 'Access-Control-Allow-Headers'     'Authorization, Content-Type, Accept, Origin, X-Requested-With' always;

        # ── Proxy to FastAPI running in Docker ────────────────────────────
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Disable buffering so streaming / SSE responses work correctly
        proxy_buffering    off;
        proxy_read_timeout 120s;
    }
}
